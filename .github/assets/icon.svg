<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256"
     role="img" aria-label="Standard Notes">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#232629"/>
      <stop offset="1" stop-color="#161a1c"/>
    </linearGradient>
    <linearGradient id="noteFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2b3034"/>
      <stop offset="1" stop-color="#1f2326"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="256" height="256" rx="36" fill="url(#bg)"/>

  <!-- Note -->
  <g transform="translate(48 40)">
    <rect x="0" y="0" width="160" height="176" rx="14" fill="url(#noteFill)"
          stroke="#bdc3c7" stroke-opacity="0.3" stroke-width="2"/>
    <rect x="0" y="0" width="160" height="22" rx="14" fill="#2f353a"/>
    <rect x="0" y="14" width="160" height="8" fill="#2f353a"/>
    <circle cx="14" cy="11" r="3.5" fill="#3daee9"/>
    <circle cx="26" cy="11" r="3.5" fill="#bdc3c7" opacity="0.55"/>
    <circle cx="38" cy="11" r="3.5" fill="#bdc3c7" opacity="0.35"/>

    <rect x="20" y="46"  width="120" height="6" rx="2" fill="#3daee9"/>
    <rect x="20" y="62"  width="100" height="4" rx="2" fill="#bdc3c7" opacity="0.55"/>
    <rect x="20" y="74"  width="110" height="4" rx="2" fill="#bdc3c7" opacity="0.45"/>

    <!-- Lock -->
    <g transform="translate(58 104)">
      <rect x="0" y="14" width="44" height="40" rx="5" fill="#3daee9"/>
      <path d="M8 14 v-6 a14 14 0 0 1 28 0 v6" fill="none"
            stroke="#3daee9" stroke-width="5" stroke-linecap="round"/>
      <circle cx="22" cy="32" r="4.5" fill="#232629"/>
      <rect x="20" y="32" width="4" height="11" rx="1.5" fill="#232629"/>
    </g>
  </g>
</svg>
